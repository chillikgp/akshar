<html class="light" lang="hi"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+Devanagari:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                        "correct": "#6aaa64",
                        "present": "#c9b458",
                        "absent": "#787c7e",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans Devanagari", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans Devanagari', 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative flex h-screen w-full flex-col max-w-md mx-auto shadow-2xl">
<!-- TopAppBar Navigation -->
<header class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark sticky top-0 z-20">
<div class="flex size-10 shrink-0 items-center justify-center text-slate-500 hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined">menu</span>
</div>
<h1 class="text-2xl font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100">अक्षर</h1>
<div class="flex gap-2 items-center justify-end">
<span class="material-symbols-outlined text-slate-500 cursor-pointer hover:text-primary" title="Hints">lightbulb</span>
<span class="material-symbols-outlined text-slate-500 cursor-pointer hover:text-primary" title="Stats">leaderboard</span>
<span class="material-symbols-outlined text-slate-500 cursor-pointer hover:text-primary" title="Help">help</span>
</div>
</header>
<!-- Main Game Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 relative">
<!-- Error Toast Notification -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 z-30 w-full px-8 pointer-events-none">
<div class="flex items-center justify-between gap-4 rounded-lg border border-primary/20 bg-slate-900/90 text-white p-3 shadow-xl backdrop-blur-sm transform transition-all duration-300">
<p class="text-sm font-medium">पर्याप्त अक्षर नहीं</p>
<button class="flex h-7 px-3 cursor-pointer items-center justify-center rounded bg-primary text-white text-xs font-bold pointer-events-auto">
<span>ठीक है</span>
</button>
</div>
</div>
<!-- Wordle Grid (5x4 tiles) -->
<div class="grid grid-cols-5 gap-2 mb-8">
<!-- Row 1: Guessed Word (Mixed states) -->
<div class="flex items-center justify-center w-14 h-14 border-2 border-correct bg-correct text-white text-2xl font-bold rounded-lg">क</div>
<div class="flex items-center justify-center w-14 h-14 border-2 border-present bg-present text-white text-2xl font-bold rounded-lg">म</div>
<div class="flex items-center justify-center w-14 h-14 border-2 border-absent bg-absent text-white text-2xl font-bold rounded-lg">ल</div>

<div class="flex items-center justify-center w-14 h-14 border-2 border-slate-300 dark:border-slate-700 text-2xl font-bold rounded-lg"></div>

<div class="flex items-center justify-center w-14 h-14 border-2 border-slate-300 dark:border-slate-700 text-2xl font-bold rounded-lg"></div>
